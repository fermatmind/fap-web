draft_title:
  zh: 如何申请删除数据或注销账号
  en: How to request data deletion or account deletion
draft_summary:
  zh: 你可以通过支持邮箱申请删除相关数据或注销账号。为了保护数据安全，我们可能需要通过邮箱确认请求人与相关记录的关系。删除完成后，相关结果可能无法再找回。
  en: "You can request data deletion or account deletion by contacting support by email. To protect your data, we may need to verify that the requesting email is associated with the relevant records. After deletion is completed, related results may no longer be recoverable."
visible_body_draft:
  zh: |
    如果你希望删除测试数据、相关记录或注销账号，可以通过支持邮箱提交请求。

    为了保护数据安全，我们通常需要确认请求邮箱与相关记录之间的关系。你可以提供：

    - 账号或测试时使用的邮箱；
    - 请求类型，例如删除测试数据、删除结果记录或注销账号；
    - 涉及的测试名称；
    - 大致完成测试或购买的时间。

    请不要在公开页面、评论区或社交平台发送完整订单编号、完整结果链接、支付流水号或历史页面链接。

    删除完成后，相关结果可能无法再找回。如果你的请求涉及付款、退款或服务履约记录，部分记录可能需要根据服务处理、退款核查或合规要求保留一段时间。具体处理范围需要由支持团队确认。
  en: |
    If you want to delete test data, related records, or your account, contact support by email.

    To protect your data, we usually need to verify that the requesting email is associated with the relevant records. You may provide:

    - the email used for the account or test;
    - the request type, such as deleting test data, deleting result records, or deleting an account;
    - the test name involved;
    - the approximate test completion or purchase time.

    Do not post full order numbers, full result links, payment identifiers, or history links on public pages, comment areas, or social platforms.

    After deletion is completed, related results may no longer be recoverable. If your request involves payment, refund, or service records, some records may need to be retained for service processing, refund review, or compliance reasons. Support will confirm the applicable scope.
faq_draft_items:
  -
    q_zh: 我可以申请删除测试数据吗？
    a_zh: 可以。你可以通过支持邮箱提交删除请求。处理前可能需要确认请求邮箱与相关记录的关系。
    q_en: "Can I request deletion of test data?"
    a_en: Yes. Contact support by email. We may need to verify that the requesting email is associated with the relevant records.
  -
    q_zh: 我可以注销账号吗？
    a_zh: 可以申请注销账号。账号相关处理范围需要根据你的记录状态和服务情况确认。
    q_en: "Can I request account deletion?"
    a_en: Yes. You can request account deletion. The scope depends on your record status and service context.
  -
    q_zh: 删除后还能找回结果吗？
    a_zh: 删除完成后，相关结果可能无法再找回。
    q_en: "Can I recover results after deletion?"
    a_en: "After deletion is completed, related results may no longer be recoverable."
  -
    q_zh: 哪些数据可能不能立即删除？
    a_zh: 如果记录涉及付款、退款或服务履约，部分记录可能需要为服务处理、退款核查或合规原因保留一段时间。
    q_en: "What data may not be deleted immediately?"
    a_en: "If records involve payment, refund, or service fulfillment, some data may need to be retained for service processing, refund review, or compliance reasons."
