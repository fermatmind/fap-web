draft_title:
  zh: 如何正确理解测评结果
  en: How to interpret assessment results
draft_summary:
  zh: 费马测试的结果用于帮助你整理性格偏好、职业兴趣和行为倾向。它们适合做自我理解和决策辅助，不应被当作疾病判断、治疗建议、招聘筛选或职业结果承诺。
  en: "FermatMind results are designed to support self-understanding, career-interest exploration, and reflection on behavioral tendencies. They should not be used as disease evaluation, treatment advice, hiring decisions, or career outcome promises."
visible_body_draft:
  zh: |
    费马测试提供的人格、职业兴趣和行为倾向结果，适合用于自我理解、职业探索、沟通反思和决策辅助。

    这些结果不应被理解为固定标签，也不应被当作人生选择的唯一依据。人格、兴趣和行为倾向会受到教育、经验、工作环境、压力状态和长期目标的影响。

    在职业决策中，测评结果可以帮助你提出更好的问题，例如：

    - 我更偏好什么样的工作环境？
    - 我在压力、协作和任务执行中有哪些稳定倾向？
    - 我应该优先探索哪些职业方向？
    - 哪些选择需要结合真实经历、技能、行业信息和外部反馈继续验证？

    测评不能替代专业服务、实际经验、技能训练或长期职业规划。它更适合作为结构化参考，而不是最终结论。
  en: |
    FermatMind assessment results are designed to support self-understanding, career-interest exploration, communication reflection, and decision support.

    They should not be treated as fixed labels or as the only basis for major life decisions. Personality, interests, and behavioral tendencies can be shaped by education, experience, work environment, stress, and long-term goals.

    In career decisions, assessment results can help you ask better questions, such as:

    - What kind of work environment do I tend to prefer?
    - What patterns appear in my stress response, collaboration, and task execution?
    - Which career directions should I explore first?
    - Which choices still require real experience, skill evidence, industry research, and external feedback?

    Assessments do not replace professional services, lived experience, skill development, or long-term career planning. They are structured references, not final conclusions.
faq_draft_items:
  -
    q_zh: 测评结果是不是固定标签？
    a_zh: 不是。测评结果更适合作为自我理解和决策辅助，不应被当作固定标签。
    q_en: "Are assessment results fixed labels?"
    a_en: "No. They are better treated as structured references for self-understanding and decision support."
  -
    q_zh: 我可以直接根据测评结果选职业吗？
    a_zh: 不建议只根据测评结果做职业决定。你还需要结合技能、经验、行业信息和真实反馈。
    q_en: "Can I choose a career based only on the result?"
    a_en: "No. Career decisions should also consider skills, experience, industry information, and real-world feedback."
  -
    q_zh: 这些测试适合解决什么问题？
    a_zh: 它们适合帮助你整理偏好、兴趣、行为倾向和职业探索方向。
    q_en: "What are these tests useful for?"
    a_en: "They can help organize preferences, interests, behavioral tendencies, and career exploration directions."
  -
    q_zh: 结果可以用于招聘或筛选别人吗？
    a_zh: 不建议将个人测评结果作为招聘筛选或评价他人的唯一依据。
    q_en: "Can results be used for hiring or screening others?"
    a_en: No. Individual assessment results should not be used as the sole basis for hiring or evaluating another person.
