draft_title:
  zh: 支付与退款说明
  en: Payment and refund help
draft_summary:
  zh: 费马测试的基础测评和部分结果可以免费使用。部分高阶报告模块可能需要付费解锁。若你付款后无法获得完整报告，并且在 7 天内联系支持邮箱，可以申请退款处理。
  en: "FermatMind provides free tests and selected free result views. Some advanced report modules may require paid unlock. If you paid but cannot access the full report, you may contact support within 7 days for refund review."
visible_body_draft:
  zh: |
    费马测试的基础测评可以免费开始。部分测试会提供免费的基础结果；某些高阶报告模块可能需要付费解锁。

    在付款前，你应该能清楚看到：

    - 当前解锁对应的测试或报告；
    - 价格和币种；
    - 解锁后预计可以查看的内容范围；
    - 支付失败或未解锁时的支持路径；
    - 退款条件和申请窗口。

    如果你已经付款，但无法获得完整报告，可以在付款后 7 天内通过支持邮箱联系我们。我们会根据购买邮箱、测试名称、付款时间和问题描述进行核查。

    退款适用于确认无法获得完整报告的情况。退款不应用于已经正常获得完整报告后的主观不满意，除非后续政策另有说明并经过运营审核。

    请不要在公开页面、社交平台或截图中展示完整订单编号、支付流水号、完整结果链接或历史页面链接。
  en: |
    FermatMind tests can be started for free. Some tests provide a free basic result view, while selected advanced report modules may require paid unlock.

    Before payment, users should be able to see:

    - which test or report the unlock applies to;
    - the price and currency;
    - what the unlocked report is expected to include;
    - where to get support if payment or unlock fails;
    - the refund window and eligibility conditions.

    If you paid but cannot access the full report, contact support by email within 7 days. We will review the case using your purchase email, test name, approximate payment time, and issue description.

    Refund review applies when we confirm that you cannot access the full report you purchased. It is not intended for cases where the full report was delivered normally and the user simply disagrees with the interpretation, unless a later reviewed policy states otherwise.

    Do not post full order numbers, payment identifiers, full result links, or history links on public pages, social platforms, or screenshots.
faq_draft_items:
  -
    q_zh: 哪些内容是免费的？
    a_zh: 基础测评可以免费开始，部分基础结果也可以免费查看。某些高阶报告模块可能需要单独付费解锁。
    q_en: "What is free?"
    a_en: "You can start the tests for free, and selected basic result views may also be free. Some advanced report modules may require paid unlock."
  -
    q_zh: 什么情况下可以申请退款？
    a_zh: 如果你付款后无法获得完整报告，并且在付款后 7 天内联系支持邮箱，可以申请退款处理。
    q_en: "When can I request a refund?"
    a_en: "If you paid but cannot access the full report, you may contact support within 7 days for refund review."
  -
    q_zh: 如果我已经看到了完整报告，还可以退款吗？
    a_zh: 如果完整报告已经正常交付，退款通常不适用于单纯主观不满意的情况。具体情况仍需由支持团队审核。
    q_en: "Can I get a refund after viewing the full report?"
    a_en: "If the full report was delivered normally, refund review usually does not apply to subjective dissatisfaction alone. Support will review any exceptional case."
  -
    q_zh: 申请退款需要提供什么？
    a_zh: 请提供购买邮箱、测试名称、付款的大致时间和问题描述。公开页面不要求提供完整订单编号。
    q_en: "What information is needed for a refund request?"
    a_en: "Provide the purchase email, test name, approximate payment time, and a short issue description. Public Help pages do not require a full order number."
