train_name: url-truth-seo-governance-train
train_description: >
  Stabilize FermatMind URL truth and SEO governance across inventory,
  sitemap/llms parity, canonical, hreflang, JSON-LD, duplicate entities,
  internal graph readiness, Evidence Container readiness, and SEO authority
  ownership without expanding Topic Graph, Career pSEO, Recommendation,
  Behavior Graph, Long-term Profile, B2B, or AI-generated SEO content.
previous_train_name: discoverability-foundation-train
base_branch: main
merge_method: squash
stop_on_failure: true
require_clean_worktree: true
execution_mode: local_clone_preferred
status: initialized
pr_namespace: PR-UG-*
branch_naming_convention: codex/pr-ug-<nn>-<short-scope>
required_github_checks:
  - build
  - contracts
  - verify-big5-contract-freeze
  - verify-enneagram-contract-freeze
train_policy:
  scope: discoverability_foundation_stabilization
  continue_if_unrelated_repo_debt_exists: true
  stop_only_on_scoped_regression_or_required_check_failure: true
  no_runtime_seo_behavior_changes_during_bootstrap: true
  no_topic_graph_rollout: true
  no_recommendation_system_rollout: true
  no_behavior_graph_rollout: true
  no_commerce_auth_report_payment_changes: true
  authority_rules:
    - backend owns SEO and discoverability truth
    - frontend deterministic render only
    - never invent frontend SEO fallback authority
    - never silently widen sitemap or llms exposure
    - never expose private take result order share flows
sidecar_issue_policy:
  continue_train_when:
    - blocker is unrelated to the current PR
    - scoped validation passes
    - required GitHub checks are green
    - no new P0 or P1 issue is introduced
  required_fields:
    - title
    - severity
    - scope impact
    - whether introduced by current PR
    - recommended future phase
    - whether it blocks merge
    - evidence
merge_policy_defaults:
  mode: github_checks_or_local_verify
  local_verify_required: true
  github_checks_required: true
  required_github_checks:
    - build
    - contracts
    - verify-big5-contract-freeze
    - verify-enneagram-contract-freeze
  merge_ready_if:
    - scoped functionality is correct
    - regression tests pass
    - required checks pass
    - no new P0 or P1 issue is introduced
    - discoverability truth improves or remains stable
    - unrelated existing debt is documented as sidecar

