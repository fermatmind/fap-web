train_name: public-runtime-authority-convergence-train
train_description: >
  Governance, inventory, contract, and report train for FermatMind Public
  Runtime Authority Convergence. The train makes backend/CMS truth, frontend
  fallback authority, public claim boundaries, discoverability authority, and
  freemium runtime coverage explicit and testable without changing public
  runtime behavior.
base_branch: main
merge_method: squash
stop_on_failure: true
require_clean_worktree: true
execution_mode: local_clone_preferred
status: initialized
pr_namespace: PR-PRAC-*
branch_naming_convention: codex/pr-prac-<nn>-<short-scope>
required_github_checks:
  - build
  - contracts
  - verify-big5-contract-freeze
  - verify-enneagram-contract-freeze

production_frontend_source_of_truth:
  primary_public_runtime: /Users/rainie/Desktop/GitHub/fap-web
  nested_skeleton_or_stale: /Users/rainie/Desktop/GitHub/fap-api/fap-web
  rule: >
    The nested fap-api/fap-web copy must not be treated as public frontend
    runtime because it is a skeleton/stale copy, not the product renderer.

runtime_status_enum:
  - production_grade
  - operational
  - partial
  - shallow_asset
  - frontend_illusion
  - backend_only
  - blocked
  - dangerous
  - unknown

fallback_classification_enum:
  - safe_static
  - product_code_only
  - compatibility_wrapper
  - watchlist
  - migration_required
  - forbidden

claim_boundary_enum:
  - allowed
  - soft_allowed
  - needs_disclaimer
  - internal_only
  - forbidden

allowed_paths:
  - docs/runtime/**
  - docs/seo/**
  - docs/claims/**
  - docs/freemium/**
  - tests/contracts/**
  - scripts/runtime/**
  - scripts/seo/**
  - docs/codex/pr-train.yaml
  - docs/codex/pr-train-state.json

forbidden_paths:
  - app/**
  - components/commerce/**
  - components/result/**
  - lib/commerce/**
  - lib/career/**
  - lib/api/**
  - checkout/payment/report/auth/attempt/scoring

train_policy:
  scope: public_runtime_authority_convergence
  governance_inventory_contract_report_only: true
  no_runtime_behavior_changes: true
  no_public_route_behavior_changes: true
  no_sitemap_url_set_changes: true
  no_llms_url_set_changes: true
  no_checkout_payment_report_entitlement_changes: true
  no_scoring_or_assessment_semantics_changes: true
  no_recommendation_runtime_changes: true
  no_topic_graph_expansion: true
  no_career_pseo_expansion: true
  no_geo_expansion: true
  no_behavior_or_long_term_profile_work: true
  public_runtime_constitution:
    - Backend/CMS owns truth where backend/CMS surface exists.
    - Frontend deterministically renders truth.
    - Public runtime must not invent SEO truth.
    - Public runtime must not invent graph truth.
    - Public runtime must not invent recommendation truth.
    - Public runtime must not overclaim runtime capabilities.
    - Fallback authority must be inventoried, classified, and gated.
    - Claim boundaries must be explicit and testable.
    - Public discoverability must not silently widen.
    - JSON-LD must align with visible content or backend authority.
    - FAQPage must come from visible FAQ or answer surface.
    - Evidence must be visible, not hidden schema stuffing.
    - Private flows must never appear in sitemap, llms, or indexable HTML.

sidecar_issue_policy:
  continue_train_when:
    - issue is not introduced by the current PR
    - required checks are green, neutral, or skipped
    - scoped validation is green
    - mergeStateStatus is CLEAN
    - diff scope is clean
  required_fields:
    - title
    - severity
    - scope_impact
    - introduced_by_current_pr
    - recommended_future_phase
    - blocks_merge
    - evidence
  required_check_failure_rule: >
    Required check failure is a hard blocker. Do not bypass required checks.

hard_blockers:
  - current PR introduces required check failure
  - current PR introduces scoped validation failure
  - mergeStateStatus is not CLEAN
  - diff exceeds scope
  - runtime SEO behavior changes
  - public route behavior changes
  - sitemap URL set changes
  - llms exposure widens
  - canonical drift is introduced
  - hreflang reciprocity breaks
  - JSON-LD authority regresses
  - private-flow exposure is introduced
  - frontend-invented SEO authority is introduced
  - frontend-invented graph authority is introduced
  - frontend-invented recommendation authority is introduced
  - hidden schema or FAQ stuffing is introduced
  - backend/CMS authority is bypassed
  - RIASEC or Big Five career recommendation overclaim is introduced
  - snapshot recommendation is described as personalized recommender
  - payment/report/auth/attempt/commerce/scoring files are touched
  - Topic Graph, Career pSEO, Recommendation, Behavior, or Profile work is introduced

merge_policy_defaults:
  mode: github_checks_or_local_verify
  local_verify_required: true
  github_checks_required: true
  required_github_checks:
    - build
    - contracts
    - verify-big5-contract-freeze
    - verify-enneagram-contract-freeze
  merge_ready_if:
    - scoped goal is complete
    - specified artifact exists
    - contract test covers artifact
    - no runtime behavior changed
    - required GitHub checks pass
    - scoped validation passes
    - diff scope is clean
    - mergeStateStatus is CLEAN
    - no new P0 or P1 issue is introduced
    - sidecar issues are documented

