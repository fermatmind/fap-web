train_name: domain-runtime-metadata-integration-train
train_description: >
  Phase 4B Domain Runtime Metadata Integration train for FermatMind core
  decision domains. This train creates metadata contracts, guard ledgers,
  generated JSON, and contract tests only. It does not add domain hub pages,
  public routes, visible copy, runtime CTAs, recommendation behavior, profile
  writes, SEO/GEO exposure, freemium runtime, scoring, or entitlement behavior.
base_branch: main
merge_method: squash
stop_on_failure: true
require_clean_worktree: true
execution_mode: local_clone_preferred
status: initialized
pr_namespace: PR-4B-*
branch_naming_convention: codex/pr-4b-<nn>-<short-scope>
required_github_checks:
  - build
  - contracts
  - verify-big5-contract-freeze
  - verify-enneagram-contract-freeze

allowed_domains:
  - self_understanding
  - career_decision
  - workstyle_decision

status_enum:
  - ready_for_runtime_v1
  - ready_for_metadata_only
  - partial
  - artifact_only
  - backend_ready
  - frontend_partial
  - blocked
  - dangerous_if_integrated
  - requires_human_decision
  - safe_to_defer
  - unknown

runtime_recommendation_enum:
  - no_runtime
  - metadata_only
  - data_attribute_only
  - existing_surface_only
  - existing_result_report_only
  - existing_cta_guard_only
  - future_runtime_candidate
  - blocked

final_readiness_enum:
  - ready
  - partial
  - blocked
  - not_applicable
  - requires_human_decision
  - unknown

train_policy:
  artifact_json_contract_only: true
  no_new_domain_hub_pages: true
  no_new_public_routes: true
  no_decision_routes: true
  no_domains_routes: true
  no_new_visible_copy: true
  no_visible_domain_badges: true
  no_runtime_cta_changes: true
  no_cta_copy_changes: true
  no_seo_geo_exposure_expansion: true
  no_sitemap_llms_widening: true
  no_recommendation_runtime_changes: true
  no_profile_memory_writes: true
  no_saved_careers_promotion: true
  no_freemium_paywall_checkout_changes: true
  no_report_entitlement_changes: true
  no_scoring_changes: true
  no_new_tests: true
  no_new_scale_onboarding: true
  no_topic_graph_expansion: true
  no_career_pseo_expansion: true
  no_frontend_rewrite: true
  no_backend_rewrite: true

allowed_paths:
  - docs/assessment/domains/**
  - docs/assessment/uasp/**
  - docs/claims/**
  - docs/seo/**
  - docs/geo/**
  - docs/freemium/**
  - docs/runtime/**
  - tests/contracts/**
  - scripts/runtime/**
  - scripts/seo/**
  - docs/codex/pr-train-4b.yaml
  - docs/codex/pr-train-4b-state.json

forbidden_paths:
  - app/**
  - components/**
  - checkout/payment/report/auth/attempt/scoring
  - career recommender runtime
  - profile runtime
  - commerce runtime
  - assessment scoring drivers
  - backend runtime code
  - content pack rewrite
  - CMS data rewrite

