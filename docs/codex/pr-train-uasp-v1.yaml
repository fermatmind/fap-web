train_name: universal-assessment-signal-platform-v1-train
train_description: >
  Contract, registry, policy, guard, and readiness dashboard train for
  FermatMind Universal Assessment Signal Platform v1. The train establishes
  the signal-source entrance protocol for existing assessments without adding
  new tests or changing scoring, report, payment, recommendation, profile, or
  SEO/GEO runtime behavior.
base_branch: main
merge_method: squash
stop_on_failure: true
require_clean_worktree: true
execution_mode: local_clone_preferred
status: initialized
pr_namespace: PR-UASP-*
branch_naming_convention: codex/pr-uasp-<nn>-<short-scope>
required_github_checks:
  - build
  - contracts
  - verify-big5-contract-freeze
  - verify-enneagram-contract-freeze

manual_decision_source:
  version: uasp.manual-decision.v1
  files:
    - /Users/rainie/Desktop/UASP_v1_manual_decision_for_codex.md
    - /Users/rainie/Desktop/uasp_v1_manual_decision_enums.json
  rule: >
    Do not invent enums or scale meanings. If an existing scale does not fit
    approved UASP v1 enums, mark requires_human_decision.

production_frontend_source_of_truth:
  primary_public_runtime: /Users/rainie/Desktop/GitHub/fap-web
  nested_skeleton_or_stale: /Users/rainie/Desktop/GitHub/fap-api/fap-web
  rule: >
    The nested fap-api/fap-web copy must not be treated as public frontend
    runtime because it is a skeleton/stale copy, not the product renderer.

allowed_first_batch_scales:
  - MBTI
  - BIG5_OCEAN
  - RIASEC
  - ENNEAGRAM

train_policy:
  scope: universal_assessment_signal_platform_v1
  contract_registry_policy_guard_dashboard_only: true
  no_new_tests: true
  no_runtime_behavior_changes: true
  no_scoring_changes: true
  no_report_entitlement_changes: true
  no_checkout_payment_changes: true
  no_recommendation_runtime_changes: true
  no_profile_runtime_changes: true
  no_seo_geo_expansion: true
  no_topic_graph_expansion: true
  no_career_pseo_expansion: true
  no_frontend_fallback_authority: true

allowed_paths:
  - docs/assessment/uasp/**
  - docs/runtime/**
  - docs/claims/**
  - docs/seo/**
  - docs/geo/**
  - docs/freemium/**
  - tests/contracts/**
  - scripts/runtime/**
  - scripts/seo/**
  - docs/codex/pr-train-uasp-v1.yaml
  - docs/codex/pr-train-uasp-v1-state.json

forbidden_paths:
  - app/**
  - components/commerce/**
  - components/result/**
  - lib/commerce/**
  - lib/career/**
  - checkout/payment/report/auth/attempt/scoring
  - career recommender runtime
  - profile runtime
  - commerce runtime
  - assessment scoring drivers

