name: Public performance audit

on:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:
    inputs:
      enforce_budgets:
        description: Fail when a target exceeds its budget or cache contract
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: public-performance-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Run read-only public performance scan
        run: node scripts/performance/audit-public-performance.mjs ${{ inputs.enforce_budgets && '--enforce' || '' }}
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: public-performance-audit
          path: generated/performance/public-performance-audit.json
          retention-days: 90
