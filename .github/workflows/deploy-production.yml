name: Deploy Web Production

on:
  workflow_run:
    workflows: ["Deploy Web Staging"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: "Exact latest main commit SHA to deploy."
        required: true
        type: string
      manual_risk_approval:
        description: "APPROVE_RISKY_FAP_WEB_PRODUCTION_DEPLOY:<40-character deploy SHA>"
        required: true
        type: string

permissions:
  checks: read
  contents: read
  deployments: read
  pull-requests: read

jobs:
  policy-guard:
    name: Production auto-deploy policy guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    outputs:
      auto_deploy_allowed: ${{ steps.evaluate.outputs.auto_deploy_allowed }}
      deploy_sha: ${{ steps.evaluate.outputs.deploy_sha }}
      associated_pr: ${{ steps.evaluate.outputs.associated_pr }}
    steps:
      - name: Evaluate production auto-deploy policy
        id: evaluate
        uses: actions/github-script@v8
        env:
          MANUAL_RISK_APPROVAL: ${{ github.event.inputs.manual_risk_approval }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const isManualDispatch = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch';
            const deploySha = process.env.GITHUB_EVENT_NAME === 'workflow_run'
              ? process.env.WORKFLOW_RUN_HEAD_SHA
              : (context.payload.inputs?.deploy_sha || '');

            if (isManualDispatch && !deploySha) {
              core.setOutput('auto_deploy_allowed', 'false');
              core.setFailed('Manual production deploy failed closed: deploy_sha is required.');
              return;
            }

            if (!deploySha || !/^[0-9a-f]{40}$/.test(deploySha)) {
              core.setOutput('auto_deploy_allowed', 'false');
              core.setFailed('Production auto-deploy policy failed closed: deploy SHA must be a 40-character lowercase hex commit SHA.');
              return;
            }

            const expectedManualApproval = `APPROVE_RISKY_FAP_WEB_PRODUCTION_DEPLOY:${deploySha}`;
            if (isManualDispatch && process.env.MANUAL_RISK_APPROVAL !== expectedManualApproval) {
              core.setOutput('auto_deploy_allowed', 'false');
              core.setFailed('Manual production deploy failed closed: manual_risk_approval must exactly match the SHA-bound approval text.');
              return;
            }

            core.setOutput('deploy_sha', deploySha);

            const { owner, repo } = context.repo;
            try {
              const main = await github.rest.repos.getBranch({ owner, repo, branch: 'main' });
              const latestMainSha = main.data.commit.sha;
              if (deploySha !== latestMainSha) {
                core.setFailed(
                  `Production auto-deploy policy failed closed: deploy SHA ${deploySha} is not latest main ${latestMainSha}.`,
                );
                return;
              }

              const requiredCheckNames = [
                'build',
                'contracts',
                'verify-big5-contract-freeze',
                'verify-enneagram-contract-freeze',
              ];
              const checkRuns = await github.paginate(
                github.rest.checks.listForRef,
                { owner, repo, ref: deploySha, per_page: 100 },
              );
              const failedRequiredChecks = requiredCheckNames.filter((name) =>
                !checkRuns.some((run) => (
                  run?.name === name && run?.status === 'completed' && run?.conclusion === 'success'
                )),
              );
              if (failedRequiredChecks.length > 0) {
                core.setFailed(
                  `Production deploy failed closed: required checks are not successful: ${failedRequiredChecks.join(', ')}.`,
                );
                return;
              }

              const deployments = await github.paginate(
                github.rest.repos.listDeployments,
                { owner, repo, environment: 'production', per_page: 100 },
              );
              let baselineSha = '';
              for (const deployment of deployments) {
                const candidateSha = String(deployment.sha || '');
                if (!/^[0-9a-f]{40}$/.test(candidateSha) || candidateSha === deploySha) {
                  continue;
                }

                const statuses = await github.paginate(
                  github.rest.repos.listDeploymentStatuses,
                  { owner, repo, deployment_id: deployment.id, per_page: 100 },
                );
                if (statuses.some((status) => status.state === 'success')) {
                  baselineSha = candidateSha;
                  break;
                }
              }

              if (!baselineSha) {
                core.setFailed('Production auto-deploy policy failed closed: no previous successful production deployment baseline was found.');
                return;
              }

              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${baselineSha}...${deploySha}`,
                per_page: 100,
              });
              if (comparison.data.status !== 'ahead' || comparison.data.behind_by !== 0) {
                core.setFailed(
                  `Production auto-deploy policy failed closed: production baseline ${baselineSha} is not an ancestor of ${deploySha}.`,
                );
                return;
              }

              const commits = await github.paginate(
                github.rest.repos.compareCommitsWithBasehead,
                { owner, repo, basehead: `${baselineSha}...${deploySha}`, per_page: 100 },
                (response) => response.data.commits,
              );
              if (commits.length === 0 || commits.at(-1)?.sha !== deploySha) {
                core.setFailed('Production auto-deploy policy failed closed: deployment change range is empty or incomplete.');
                return;
              }

              const pullsByNumber = new Map();
              for (const commit of commits) {
                const associatedPulls = await github.paginate(
                  github.rest.repos.listPullRequestsAssociatedWithCommit,
                  { owner, repo, commit_sha: commit.sha, per_page: 100 },
                );
                const mergedMainPulls = [
                  ...new Map(
                    associatedPulls
                      .filter((pull) => pull.base?.ref === 'main' && pull.merged_at)
                      .map((pull) => [pull.number, pull]),
                  ).values(),
                ];
                if (mergedMainPulls.length !== 1) {
                  core.setFailed(
                    `Production auto-deploy policy failed closed: expected exactly one merged main PR for range commit ${commit.sha}, found ${mergedMainPulls.length}.`,
                  );
                  return;
                }
                pullsByNumber.set(mergedMainPulls[0].number, mergedMainPulls[0]);
              }

              const pulls = [...pullsByNumber.values()];
              core.setOutput('associated_pr', pulls.map((pull) => pull.number).join(','));
              core.info(`Production deploy range: ${baselineSha}...${deploySha}`);
              core.info(`Associated PRs: ${pulls.map((pull) => `#${pull.number} ${pull.title}`).join('; ')}`);

              const normalizeLabelName = (label) => (
                typeof label === 'string'
                  ? label.toLowerCase()
                  : String(label?.name || '').toLowerCase()
              );
              const labels = pulls
                .flatMap((pull) => (pull.labels || []).map(normalizeLabelName))
                .filter(Boolean);
            const riskyLabelPatterns = [
              /(^|[-_: ])no[-_: ]?auto[-_: ]?production($|[-_: ])/,
              /(^|[-_: ])manual[-_: ]?production($|[-_: ])/,
              /(^|[-_: ])production[-_: ]?manual($|[-_: ])/,
              /(^|[-_: ])requires[-_: ]?production[-_: ]?approval($|[-_: ])/,
              /(^|[-_: ])cms($|[-_: ])/,
              /(^|[-_: ])search($|[-_: ])/,
              /(^|[-_: ])sitemap($|[-_: ])/,
              /(^|[-_: ])llms($|[-_: ])/,
              /(^|[-_: ])content[-_: ]?release($|[-_: ])/,
              /(^|[-_: ])deploy($|[-_: ])/,
              /(^|[-_: ])secret(s)?($|[-_: ])/,
            ];
              const riskyLabels = [...new Set(
                labels.filter((label) => riskyLabelPatterns.some((pattern) => pattern.test(label))),
              )];

              const files = [];
              for (const pull of pulls) {
                files.push(...await github.paginate(
                  github.rest.pulls.listFiles,
                  { owner, repo, pull_number: pull.number, per_page: 100 },
                ));
              }
            const riskyPathPatterns = [
              /^\.github\/workflows\//,
              /^\.github\/actions\//,
              /^deploy\//,
              /^docs\/deploy\//,
              /^scripts\/[^/]*deploy/i,
              /^scripts\/.*\/[^/]*deploy/i,
              /^scripts\/deploy_/i,
              /^scripts\/release_/i,
              /^scripts\/seo\//,
              /^lib\/seo\//,
              /^app\/sitemap\.xml\//,
              /^app\/llms\.txt\//,
              /^app\/llms-full\.txt\//,
              /^app\/api\/content-release\//,
              /^public\/sitemap\.xml$/,
              /^llms\.txt$/,
              /^llms-full\.txt$/,
              /(^|\/)\.env($|\.|-)/,
              /(^|\/).*secret.*$/i,
            ];
              const riskyFiles = [...new Set(
                files
                  .map((file) => file.filename)
                  .filter((filename) => riskyPathPatterns.some((pattern) => pattern.test(filename))),
              )];

              if (riskyLabels.length > 0 || riskyFiles.length > 0) {
                if (!isManualDispatch) {
                  core.setOutput('auto_deploy_allowed', 'false');
                  core.setFailed([
                    'Production auto-deploy policy failed closed.',
                    riskyLabels.length > 0 ? `Risk labels: ${riskyLabels.join(', ')}` : 'Risk labels: none',
                    riskyFiles.length > 0 ? `Risk files: ${riskyFiles.join(', ')}` : 'Risk files: none',
                    'Risky production revisions require SHA-bound workflow_dispatch authorization and protected production Environment approval.',
                  ].join('\n'));
                  return;
                }

                core.warning([
                  'Authorized manual risky production revision.',
                  riskyLabels.length > 0 ? `Risk labels: ${riskyLabels.join(', ')}` : 'Risk labels: none',
                  riskyFiles.length > 0 ? `Risk files: ${riskyFiles.join(', ')}` : 'Risk files: none',
                  'The deploy job remains gated by the protected production GitHub Environment.',
                ].join('\n'));
                core.setOutput('auto_deploy_allowed', 'true');
                return;
              }

              core.setOutput('auto_deploy_allowed', 'true');
              core.info('Production auto-deploy policy passed for the complete verified main change range.');
            } catch (error) {
              core.setOutput('auto_deploy_allowed', 'false');
              core.setFailed(`Production auto-deploy policy failed closed after a GitHub API error: ${error.message}`);
            }

  deploy-production:
    name: Deploy fap-web production Node1
    needs: policy-guard
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ needs.policy-guard.outputs.auto_deploy_allowed == 'true' }}
    concurrency:
      group: deploy-web-production-${{ github.repository }}
      cancel-in-progress: false
    environment:
      name: production
    env:
      DEPLOY_HOST: ${{ secrets.WEB_NODE1_DEPLOY_HOST || vars.WEB_NODE1_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.WEB_NODE1_DEPLOY_USER || vars.WEB_NODE1_DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.WEB_NODE1_DEPLOY_PORT || vars.WEB_NODE1_DEPLOY_PORT }}
      APP_DIR: ${{ secrets.WEB_NODE1_APP_DIR || vars.WEB_NODE1_APP_DIR }}
      APP_NAME: ${{ secrets.WEB_NODE1_APP_NAME || vars.WEB_NODE1_APP_NAME }}
      APP_PORT: ${{ secrets.WEB_NODE1_APP_PORT || vars.WEB_NODE1_APP_PORT }}
      APP_MANAGER: ${{ secrets.WEB_NODE1_APP_MANAGER || vars.WEB_NODE1_APP_MANAGER }}
      SYSTEMD_SERVICE: ${{ secrets.WEB_NODE1_SYSTEMD_SERVICE || vars.WEB_NODE1_SYSTEMD_SERVICE }}
      PUBLIC_BASE_URL: ${{ secrets.WEB_PUBLIC_BASE_URL || vars.WEB_PUBLIC_BASE_URL }}
      NEXT_PUBLIC_API_URL: ${{ secrets.WEB_NEXT_PUBLIC_API_URL || vars.WEB_NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.WEB_NEXT_PUBLIC_SITE_URL || vars.WEB_NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_ANALYTICS_ENABLED: ${{ secrets.WEB_NEXT_PUBLIC_ANALYTICS_ENABLED || vars.WEB_NEXT_PUBLIC_ANALYTICS_ENABLED }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.WEB_NEXT_PUBLIC_GA_MEASUREMENT_ID || vars.WEB_NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      NEXT_PUBLIC_BAIDU_TONGJI_ID: ${{ secrets.WEB_NEXT_PUBLIC_BAIDU_TONGJI_ID || vars.WEB_NEXT_PUBLIC_BAIDU_TONGJI_ID }}
      CORE_PUBLIC_PATH: ${{ secrets.WEB_PRODUCTION_CORE_PUBLIC_PATH || vars.WEB_PRODUCTION_CORE_PUBLIC_PATH }}
      RUN_SITEMAP_HEALTH: ${{ secrets.WEB_PRODUCTION_RUN_SITEMAP_HEALTH || vars.WEB_PRODUCTION_RUN_SITEMAP_HEALTH }}
      SSH_RETRY_ATTEMPTS: "3"
      SSH_RETRY_DELAY_SECONDS: "10"

    steps:
      - name: Checkout approved revision
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.policy-guard.outputs.deploy_sha }}

      - name: Resolve production deploy settings
        shell: bash
        env:
          POLICY_DEPLOY_SHA: ${{ needs.policy-guard.outputs.deploy_sha }}
        run: |
          set -euo pipefail
          DEPLOY_SHA="$POLICY_DEPLOY_SHA"

          test -n "$DEPLOY_SHA"
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"

          analytics_config_failed=0
          if [[ "$NEXT_PUBLIC_ANALYTICS_ENABLED" == "true" ]]; then
            echo "analytics_enabled=PASS"
          else
            echo "analytics_enabled=FAIL"
            analytics_config_failed=1
          fi
          if [[ "$NEXT_PUBLIC_GA_MEASUREMENT_ID" =~ ^G-[A-Z0-9]{4,32}$ ]]; then
            echo "ga_measurement_id=PASS"
          else
            echo "ga_measurement_id=FAIL"
            analytics_config_failed=1
          fi
          if [[ "$NEXT_PUBLIC_BAIDU_TONGJI_ID" =~ ^[a-f0-9]{16,64}$ ]]; then
            echo "baidu_tongji_id=PASS"
          else
            echo "baidu_tongji_id=FAIL"
            analytics_config_failed=1
          fi
          test "$analytics_config_failed" -eq 0

          : "${DEPLOY_PORT:=22}"
          : "${APP_DIR:=/opt/apps/fap-web}"
          : "${APP_NAME:=fap-web}"
          : "${APP_PORT:=3000}"
          : "${APP_MANAGER:=pm2}"
          : "${SYSTEMD_SERVICE:=fap-web.service}"
          : "${PUBLIC_BASE_URL:=https://fermatmind.com}"
          : "${NEXT_PUBLIC_API_URL:=https://api.fermatmind.com}"
          : "${NEXT_PUBLIC_SITE_URL:=https://fermatmind.com}"
          : "${CORE_PUBLIC_PATH:=/zh/personality/intj-a}"
          : "${RUN_SITEMAP_HEALTH:=1}"

          {
            echo "DEPLOY_SHA=$DEPLOY_SHA"
            echo "DEPLOY_PORT=$DEPLOY_PORT"
            echo "APP_DIR=$APP_DIR"
            echo "APP_NAME=$APP_NAME"
            echo "APP_PORT=$APP_PORT"
            echo "APP_MANAGER=$APP_MANAGER"
            echo "SYSTEMD_SERVICE=$SYSTEMD_SERVICE"
            echo "PUBLIC_BASE_URL=$PUBLIC_BASE_URL"
            echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
            echo "NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL"
            echo "CORE_PUBLIC_PATH=$CORE_PUBLIC_PATH"
            echo "RUN_SITEMAP_HEALTH=$RUN_SITEMAP_HEALTH"
            echo "GIT_BRANCH=main"
            echo "RUN_CMS_BASELINE_STAGING_SMOKE=0"
            echo "RUN_CONTENT_RELEASE_REVALIDATE_SMOKE=0"
          } >> "$GITHUB_ENV"

      - name: Confirm approved revision is still latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          LATEST_MAIN_SHA="$(git rev-parse origin/main)"
          echo "deploy_sha=$DEPLOY_SHA"
          echo "latest_main_sha=$LATEST_MAIN_SHA"
          test "$DEPLOY_SHA" = "$LATEST_MAIN_SHA"

      - name: Set up SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install pinned SSH known_hosts
        shell: bash
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$SSH_KNOWN_HOSTS"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: SSH preflight
        shell: bash
        run: |
          set -euo pipefail
          ssh_retry() {
            local attempt rc
            for attempt in $(seq 1 "$SSH_RETRY_ATTEMPTS"); do
              set +e
              ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
                -p "$DEPLOY_PORT" "$@"
              rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                return 0
              fi
              if [ "$attempt" -eq "$SSH_RETRY_ATTEMPTS" ]; then
                return "$rc"
              fi
              echo "SSH preflight attempt $attempt failed; retrying in ${SSH_RETRY_DELAY_SECONDS}s" >&2
              sleep "$SSH_RETRY_DELAY_SECONDS"
            done
          }
          ssh_retry "$DEPLOY_USER@$DEPLOY_HOST" \
            "whoami; hostname; test -d '$APP_DIR' && echo app_dir_ok"

      - name: Deploy production with PM2
        shell: bash
        run: |
          set -euo pipefail
          ssh_retry() {
            local attempt rc
            for attempt in $(seq 1 "$SSH_RETRY_ATTEMPTS"); do
              set +e
              ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
                -p "$DEPLOY_PORT" "$@"
              rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                return 0
              fi
              if [ "$attempt" -eq "$SSH_RETRY_ATTEMPTS" ]; then
                return "$rc"
              fi
              echo "SSH deploy attempt $attempt failed; retrying in ${SSH_RETRY_DELAY_SECONDS}s" >&2
              sleep "$SSH_RETRY_DELAY_SECONDS"
            done
          }
          ssh_retry "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$APP_DIR' && git fetch --prune origin && git checkout -B '$GIT_BRANCH' 'origin/$GIT_BRANCH' && git reset --hard '$DEPLOY_SHA' && APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' APP_PORT='$APP_PORT' APP_MANAGER='$APP_MANAGER' SYSTEMD_SERVICE='$SYSTEMD_SERVICE' PUBLIC_BASE_URL='$PUBLIC_BASE_URL' NEXT_PUBLIC_API_URL='$NEXT_PUBLIC_API_URL' NEXT_PUBLIC_SITE_URL='$NEXT_PUBLIC_SITE_URL' NEXT_PUBLIC_ANALYTICS_ENABLED='$NEXT_PUBLIC_ANALYTICS_ENABLED' NEXT_PUBLIC_GA_MEASUREMENT_ID='$NEXT_PUBLIC_GA_MEASUREMENT_ID' NEXT_PUBLIC_BAIDU_TONGJI_ID='$NEXT_PUBLIC_BAIDU_TONGJI_ID' GIT_BRANCH='$GIT_BRANCH' DEPLOY_SHA='$DEPLOY_SHA' RUN_SITEMAP_HEALTH='$RUN_SITEMAP_HEALTH' CORE_PUBLIC_PATH='$CORE_PUBLIC_PATH' RUN_CMS_BASELINE_STAGING_SMOKE='0' RUN_CONTENT_RELEASE_REVALIDATE_SMOKE='0' bash '$APP_DIR/scripts/deploy_web_pm2.sh'"

      - name: Verify deployed revision
        shell: bash
        run: |
          set -euo pipefail
          ssh_retry() {
            local attempt rc
            for attempt in $(seq 1 "$SSH_RETRY_ATTEMPTS"); do
              set +e
              ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
                -p "$DEPLOY_PORT" "$@"
              rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                return 0
              fi
              if [ "$attempt" -eq "$SSH_RETRY_ATTEMPTS" ]; then
                return "$rc"
              fi
              echo "SSH verify attempt $attempt failed; retrying in ${SSH_RETRY_DELAY_SECONDS}s" >&2
              sleep "$SSH_RETRY_DELAY_SECONDS"
            done
          }
          DEPLOYED_SHA="$(ssh_retry "$DEPLOY_USER@$DEPLOY_HOST" "git -C '$APP_DIR' rev-parse HEAD")"
          echo "deployed_sha=$DEPLOYED_SHA"
          test "$DEPLOYED_SHA" = "$DEPLOY_SHA"

      - name: Smoke production public surfaces
        shell: bash
        run: |
          set -euo pipefail
          body_file="$(mktemp)"
          trap 'rm -f "$body_file"' EXIT

          curl -fsSIL "${PUBLIC_BASE_URL}/en" | sed -n '1,20p'
          curl -fsSIL "${PUBLIC_BASE_URL}/zh" | sed -n '1,20p'
          curl -fsSIL "${PUBLIC_BASE_URL}${CORE_PUBLIC_PATH}" | sed -n '1,20p'
          curl -fsSI "${PUBLIC_BASE_URL}/sitemap.xml" | sed -n '1,20p'
          curl -fsSI "${PUBLIC_BASE_URL}/llms.txt" | sed -n '1,20p'
          curl -fsSI "${PUBLIC_BASE_URL}/llms-full.txt" | sed -n '1,20p'

          for path in /zh /zh/personality/intj-a /zh/articles; do
            curl -fsSL -o "$body_file" "${PUBLIC_BASE_URL}${path}"
            grep -q 'fm-analytics-bootstrap' "$body_file"
          done

          for path in /zh/result/SYNTHETIC_DO_NOT_USE /zh/orders/lookup /zh/pay/wait /zh/payment/stripe/cancel; do
            curl -sSL -o "$body_file" "${PUBLIC_BASE_URL}${path}"
            if grep -Eiq 'fm-analytics-bootstrap|data-analytics-bootstrap|googletagmanager|hm\.baidu' "$body_file"; then
              echo "private analytics smoke failed path=${path}" >&2
              exit 1
            fi
          done
