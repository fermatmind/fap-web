name: Deploy Web Production

on:
  workflow_run:
    workflows: ["Deploy Web Staging"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: "Exact main commit SHA to deploy. Defaults to current main."
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy fap-web production Node1
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    concurrency:
      group: deploy-web-production-${{ github.repository }}
      cancel-in-progress: false
    environment:
      name: production
    env:
      DEPLOY_HOST: ${{ vars.WEB_NODE1_DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.WEB_NODE1_DEPLOY_USER }}
      DEPLOY_PORT: ${{ vars.WEB_NODE1_DEPLOY_PORT }}
      APP_DIR: ${{ vars.WEB_NODE1_APP_DIR }}
      APP_NAME: ${{ vars.WEB_NODE1_APP_NAME }}
      APP_PORT: ${{ vars.WEB_NODE1_APP_PORT }}
      APP_MANAGER: ${{ vars.WEB_NODE1_APP_MANAGER }}
      SYSTEMD_SERVICE: ${{ vars.WEB_NODE1_SYSTEMD_SERVICE }}
      PUBLIC_BASE_URL: ${{ vars.WEB_PUBLIC_BASE_URL }}
      NEXT_PUBLIC_API_URL: ${{ vars.WEB_NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.WEB_NEXT_PUBLIC_SITE_URL }}
      CORE_PUBLIC_PATH: ${{ vars.WEB_PRODUCTION_CORE_PUBLIC_PATH }}
      RUN_SITEMAP_HEALTH: ${{ vars.WEB_PRODUCTION_RUN_SITEMAP_HEALTH }}
      SSH_RETRY_ATTEMPTS: "3"
      SSH_RETRY_DELAY_SECONDS: "10"

    steps:
      - name: Checkout approved revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.deploy_sha || github.sha }}

      - name: Resolve production deploy settings
        shell: bash
        env:
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_DEPLOY_SHA: ${{ inputs.deploy_sha }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            DEPLOY_SHA="$WORKFLOW_RUN_HEAD_SHA"
          else
            DEPLOY_SHA="${DISPATCH_DEPLOY_SHA:-$GITHUB_SHA}"
          fi

          test -n "$DEPLOY_SHA"
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"

          : "${DEPLOY_PORT:=22}"
          : "${APP_DIR:=/opt/apps/fap-web}"
          : "${APP_NAME:=fap-web}"
          : "${APP_PORT:=3000}"
          : "${APP_MANAGER:=pm2}"
          : "${SYSTEMD_SERVICE:=fap-web.service}"
          : "${PUBLIC_BASE_URL:=https://fermatmind.com}"
          : "${NEXT_PUBLIC_API_URL:=https://api.fermatmind.com}"
          : "${NEXT_PUBLIC_SITE_URL:=https://fermatmind.com}"
          : "${CORE_PUBLIC_PATH:=/zh/personality/intj-a}"
          : "${RUN_SITEMAP_HEALTH:=1}"

          {
            echo "DEPLOY_SHA=$DEPLOY_SHA"
            echo "DEPLOY_PORT=$DEPLOY_PORT"
            echo "APP_DIR=$APP_DIR"
            echo "APP_NAME=$APP_NAME"
            echo "APP_PORT=$APP_PORT"
            echo "APP_MANAGER=$APP_MANAGER"
            echo "SYSTEMD_SERVICE=$SYSTEMD_SERVICE"
            echo "PUBLIC_BASE_URL=$PUBLIC_BASE_URL"
            echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
            echo "NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL"
            echo "CORE_PUBLIC_PATH=$CORE_PUBLIC_PATH"
            echo "RUN_SITEMAP_HEALTH=$RUN_SITEMAP_HEALTH"
            echo "GIT_BRANCH=main"
            echo "RUN_CMS_BASELINE_STAGING_SMOKE=0"
            echo "RUN_CONTENT_RELEASE_REVALIDATE_SMOKE=0"
          } >> "$GITHUB_ENV"

      - name: Confirm approved revision is still latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          LATEST_MAIN_SHA="$(git rev-parse origin/main)"
          echo "deploy_sha=$DEPLOY_SHA"
          echo "latest_main_sha=$LATEST_MAIN_SHA"
          test "$DEPLOY_SHA" = "$LATEST_MAIN_SHA"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install pinned SSH known_hosts
        shell: bash
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$SSH_KNOWN_HOSTS"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: SSH preflight
        shell: bash
        run: |
          set -euo pipefail
          ssh_retry() {
            local attempt rc
            for attempt in $(seq 1 "$SSH_RETRY_ATTEMPTS"); do
              set +e
              ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
                -p "$DEPLOY_PORT" "$@"
              rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                return 0
              fi
              if [ "$attempt" -eq "$SSH_RETRY_ATTEMPTS" ]; then
                return "$rc"
              fi
              echo "SSH preflight attempt $attempt failed; retrying in ${SSH_RETRY_DELAY_SECONDS}s" >&2
              sleep "$SSH_RETRY_DELAY_SECONDS"
            done
          }
          ssh_retry "$DEPLOY_USER@$DEPLOY_HOST" \
            "whoami; hostname; test -d '$APP_DIR' && echo app_dir_ok"

      - name: Deploy production with PM2
        shell: bash
        run: |
          set -euo pipefail
          ssh_retry() {
            local attempt rc
            for attempt in $(seq 1 "$SSH_RETRY_ATTEMPTS"); do
              set +e
              ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
                -p "$DEPLOY_PORT" "$@"
              rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                return 0
              fi
              if [ "$attempt" -eq "$SSH_RETRY_ATTEMPTS" ]; then
                return "$rc"
              fi
              echo "SSH deploy attempt $attempt failed; retrying in ${SSH_RETRY_DELAY_SECONDS}s" >&2
              sleep "$SSH_RETRY_DELAY_SECONDS"
            done
          }
          ssh_retry "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$APP_DIR' && git fetch --prune origin && git checkout -B '$GIT_BRANCH' 'origin/$GIT_BRANCH' && git reset --hard '$DEPLOY_SHA' && APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' APP_PORT='$APP_PORT' APP_MANAGER='$APP_MANAGER' SYSTEMD_SERVICE='$SYSTEMD_SERVICE' PUBLIC_BASE_URL='$PUBLIC_BASE_URL' NEXT_PUBLIC_API_URL='$NEXT_PUBLIC_API_URL' NEXT_PUBLIC_SITE_URL='$NEXT_PUBLIC_SITE_URL' GIT_BRANCH='$GIT_BRANCH' DEPLOY_SHA='$DEPLOY_SHA' RUN_SITEMAP_HEALTH='$RUN_SITEMAP_HEALTH' CORE_PUBLIC_PATH='$CORE_PUBLIC_PATH' RUN_CMS_BASELINE_STAGING_SMOKE='0' RUN_CONTENT_RELEASE_REVALIDATE_SMOKE='0' bash '$APP_DIR/scripts/deploy_web_pm2.sh'"

      - name: Verify deployed revision
        shell: bash
        run: |
          set -euo pipefail
          ssh_retry() {
            local attempt rc
            for attempt in $(seq 1 "$SSH_RETRY_ATTEMPTS"); do
              set +e
              ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
                -p "$DEPLOY_PORT" "$@"
              rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                return 0
              fi
              if [ "$attempt" -eq "$SSH_RETRY_ATTEMPTS" ]; then
                return "$rc"
              fi
              echo "SSH verify attempt $attempt failed; retrying in ${SSH_RETRY_DELAY_SECONDS}s" >&2
              sleep "$SSH_RETRY_DELAY_SECONDS"
            done
          }
          DEPLOYED_SHA="$(ssh_retry "$DEPLOY_USER@$DEPLOY_HOST" "git -C '$APP_DIR' rev-parse HEAD")"
          echo "deployed_sha=$DEPLOYED_SHA"
          test "$DEPLOYED_SHA" = "$DEPLOY_SHA"

      - name: Smoke production public surfaces
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSIL "${PUBLIC_BASE_URL}/en" | sed -n '1,20p'
          curl -fsSIL "${PUBLIC_BASE_URL}/zh" | sed -n '1,20p'
          curl -fsSIL "${PUBLIC_BASE_URL}${CORE_PUBLIC_PATH}" | sed -n '1,20p'
          curl -fsSI "${PUBLIC_BASE_URL}/sitemap.xml" | sed -n '1,20p'
          curl -fsSI "${PUBLIC_BASE_URL}/llms.txt" | sed -n '1,20p'
          curl -fsSI "${PUBLIC_BASE_URL}/llms-full.txt" | sed -n '1,20p'
