name: Node 24 Readiness (experimental)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  node20-baseline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm run check:runtime

      - run: pnpm build

      - run: pnpm exec tsc --noEmit --pretty false

      - run: pnpm exec vitest run tests/contracts/proxy-boundary.contract.test.ts tests/contracts/site-url.contract.test.ts

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm exec playwright test tests/e2e/seo-root-gateway.spec.ts --project=chromium

  node24-readiness:
    runs-on: ubuntu-latest
    env:
      RUNTIME_VALIDATION_MODE: readiness

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: corepack enable

      - run: pnpm install --frozen-lockfile --config.engine-strict=false

      - run: pnpm run check:runtime

      - run: pnpm build

      - run: pnpm exec tsc --noEmit --pretty false

      - run: pnpm exec vitest run tests/contracts/proxy-boundary.contract.test.ts tests/contracts/site-url.contract.test.ts

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm exec playwright test tests/e2e/seo-root-gateway.spec.ts --project=chromium
