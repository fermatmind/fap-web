name: Web Public Ingress Config

on:
  pull_request:
    paths:
      - deploy/openresty/fap-web-public.conf
      - scripts/ops/test-web-public-ingress-openresty.sh
      - scripts/ops/validate-web-public-ingress-config.mjs
      - scripts/ops/web-public-ingress.sh
      - .github/workflows/web-public-ingress-config.yml
      - .github/workflows/web-public-ingress.yml
  push:
    branches: [main]
    paths:
      - deploy/openresty/fap-web-public.conf
      - scripts/ops/test-web-public-ingress-openresty.sh
      - scripts/ops/validate-web-public-ingress-config.mjs
      - scripts/ops/web-public-ingress.sh
      - .github/workflows/web-public-ingress-config.yml
      - .github/workflows/web-public-ingress.yml

permissions:
  contents: read

jobs:
  web-public-ingress-config:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate fail-closed candidate structure
        run: node scripts/ops/validate-web-public-ingress-config.mjs --config deploy/openresty/fap-web-public.conf
      - name: Validate shell syntax
        run: bash -n scripts/ops/web-public-ingress.sh scripts/ops/test-web-public-ingress-openresty.sh
      - name: Test with the production OpenResty image digest
        run: bash scripts/ops/test-web-public-ingress-openresty.sh
