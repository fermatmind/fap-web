name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Contract tests
        run: pnpm test:contract

      - name: Build
        run: pnpm build

      - name: Build hash evidence
        run: bash scripts/release_evidence.sh

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: artifacts/release-evidence
          if-no-files-found: error

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm test:e2e tests/e2e/*.spec.ts

      - name: UAT matrix (mock)
        run: bash scripts/run_uat_matrix.sh mock

      - name: Visual snapshots
        run: pnpm test:e2e:visual

      - name: A11y tests
        run: pnpm test:a11y

      - name: Release gate
        run: pnpm release:gate
