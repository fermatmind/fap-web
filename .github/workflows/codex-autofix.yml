name: Codex Auto-Fix on PR CI Failure

run-name: Codex autofix safety boundary

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# workflow_run can run with repository credentials. Keep this workflow without
# repository token scopes, secrets, PR-head checkout, project script execution,
# or push-back behavior.
permissions: {}

concurrency:
  group: codex-autofix-${{ github.event.workflow_run.head_branch || github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  safe-autofix-boundary:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}

    steps:
      - name: Record safe autofix boundary
        env:
          FAILED_WORKFLOW_ID: ${{ github.event.workflow_run.id }}
          FAILED_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          FAILED_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "Codex autofix is intentionally read-only in GitHub Actions."
          printf 'failed_workflow=%s\n' "${FAILED_WORKFLOW_NAME}"
          printf 'failed_workflow_id=%s\n' "${FAILED_WORKFLOW_ID}"
          printf 'failed_head_branch=%s\n' "${FAILED_HEAD_BRANCH}"
          printf 'failed_head_sha=%s\n' "${FAILED_HEAD_SHA}"

          cat <<'EOF'
          Automatic PR autofix is disabled in this workflow. A privileged
          workflow must not check out PR-controlled code, run project scripts,
          pass secrets, or push commits back to a pull-request branch.

          Safe follow-up path:
          - inspect the failed run from a trusted maintainer context;
          - make fixes from a trusted local session or trusted branch;
          - open a normal PR and let required CI checks enforce merge safety.
          EOF
