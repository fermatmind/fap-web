# Canonical FermatMind public web ingress for the Node1 1Panel OpenResty
# container. This file is installed only by the SHA-bound production workflow.

server {
  listen 80;
  server_name fermatmind.com www.fermatmind.com;

  location ^~ /.well-known/acme-challenge/ {
    allow all;
    default_type "text/plain";
    root /usr/share/nginx/html;
  }

  location = /healthz {
    return 200 "ok\n";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name fermatmind.com www.fermatmind.com;

  ssl_certificate /www/sites/fermatmind.com/ssl/fullchain.pem;
  ssl_certificate_key /www/sites/fermatmind.com/ssl/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000" always;

  location = /healthz {
    return 200 "ok\n";
  }

  location ^~ /share/ {
    root /usr/share/nginx/html;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    expires 1h;
  }

  # Content-hashed Next.js assets are the only proxied surface allowed to use
  # the public microcache. Nonce-bearing HTML must never enter this location.
  location ^~ /_next/static/ {
    proxy_cache fermatmind_public;
    proxy_cache_key "$scheme$host$uri";
    proxy_cache_valid 200 365d;
    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    proxy_hide_header Set-Cookie;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Proxy-Cache $upstream_cache_status always;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 2s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
  }

  location = /favicon.ico {
    proxy_cache fermatmind_public;
    proxy_cache_key "$scheme$host$uri";
    proxy_cache_valid 200 30m;
    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    proxy_hide_header Set-Cookie;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "public, max-age=1800, stale-while-revalidate=3600" always;
    add_header X-Proxy-Cache $upstream_cache_status always;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next.js emits a per-request CSP nonce and private/no-store cache headers
  # for HTML. Preserve those upstream headers and bypass the proxy cache for
  # every non-static route, including /, localized pages, API proxies,
  # sitemap.xml, llms.txt, llms-full.txt and /revision.
  location / {
    proxy_cache off;
    proxy_no_cache 1;
    proxy_cache_bypass 1;
    add_header X-Proxy-Cache BYPASS always;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_connect_timeout 2s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
  }
}
